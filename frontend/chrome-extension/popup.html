<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f97316; /* Vibrant Orange */
      --secondary: #fbbf24; /* Amber */
      --bg: #020617; /* Deep Slate */
      --card-bg: rgba(15, 23, 42, 0.7);
      --border: rgba(249, 115, 22, 0.2);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }

    html {
      border-radius: 16px;
      overflow: hidden;
      background-color: var(--bg);
    }

    body {
      font-family: 'Outfit', sans-serif;
      width: 380px;
      padding: 0;
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      overflow-y: overlay;
      border-radius: 16px;
      background-image: 
        radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(251, 191, 36, 0.05) 0px, transparent 50%);
    }

    /* Custom Modern Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .header {
      padding: 20px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon { font-size: 1.5rem; }

    h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .brand-accent { color: var(--primary); }

    .status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--primary);
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 9999px;
    }

    .content {
      padding: 24px 20px;
    }

    #setup-view p {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 0;
    }

    #summarizeBtn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #ea580c);
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #summarizeBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -5px rgba(249, 115, 22, 0.5);
    }

    #summarizeBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading State */
    .loading {
      display: none;
      text-align: center;
      padding: 40px 0;
    }

    .spinner {
      position: relative;
      width: 40px;
      height: 40px;
      margin: 0 auto 20px;
    }

    .pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.6;
      animation: pulse 1s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.2); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .loading-text {
      font-weight: 700;
      color: var(--secondary);
      letter-spacing: 0.05em;
    }

    /* Results */
    #results {
      display: none;
      margin-top: 10px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--primary);
    }

    .card-title {
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-body {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #e2e8f0;
    }

    .meta-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .meta-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px dotted var(--border);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }

    .meta-title {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .meta-value {
      font-weight: 700;
      font-size: 0.85rem;
      color: #fff;
    }

    .badge-positive { color: #4ade80; }
    .badge-negative { color: #f87171; }
    .badge-neutral { color: var(--secondary); }

    footer {
      text-align: center;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">🚀</span>
      <h2>Cyber<span class="brand-accent">Brief</span></h2>
    </div>
    <span class="status">Neural Core v1.2</span>
  </div>

  <div class="content">
    <div id="setup-view">
      <p>Analyze this page with the Solar Flare Neural Engine.</p>
      <button id="summarizeBtn">Analysis Start</button>
    </div>

    <div id="loading" class="loading">
      <div class="spinner">
        <div class="pulse"></div>
      </div>
      <p class="loading-text">SCALING NEURAL LAYERS...</p>
    </div>

    <div id="results">
      <div class="card">
        <div class="card-title">English Summary</div>
        <div class="card-body" id="summaryEn">...</div>
      </div>

      <div class="card">
        <div class="card-title">हिंदी सारांश</div>
        <div class="card-body" id="summaryHi">...</div>
      </div>

      <div class="meta-row">
        <div class="meta-card">
          <div class="meta-title">Sentiment</div>
          <div id="sentiment" class="meta-value">NEUTRAL</div>
        </div>
        <div class="meta-card">
          <div class="meta-title">Category</div>
          <div id="category" class="meta-value">GENERAL</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    SOLAR FLARE SYSTEM &bull; PORT 8000 &bull; 2026
  </footer>

  <script src="popup.js"></script>
</body>
</html>
